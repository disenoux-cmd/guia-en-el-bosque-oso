<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Rol de Guía en el Bosque de la Formación</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        oso: {
                            dark: '#1e293b', // Deep blue/black for bear body
                            light: '#f8fafc', // White for face
                            accent: '#d97706', // Brown/Orange for vest/hat
                            bg: '#14b8a6' // Teal background reference
                        }
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.5s ease-out forwards'
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        'pulse-glow': {
                            '0%, 100%': { opacity: 1, filter: 'drop-shadow(0 0 8px rgba(234,179,8,0.6))' },
                            '50%': { opacity: .7, filter: 'drop-shadow(0 0 2px rgba(234,179,8,0.2))' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: 0 },
                            '100%': { transform: 'translateY(0)', opacity: 1 },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; overflow: hidden; }
        .forest-bg {
            background: linear-gradient(to bottom, #064e3b 0%, #022c22 100%);
            position: relative;
        }
        .forest-bg::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px; opacity: 0.3; pointer-events: none;
        }
        
        /* Drag and drop custom styles for mobile fallback */
        .draggable-item { cursor: pointer; transition: all 0.2s; }
        .draggable-item:hover { transform: scale(1.02); }
        .draggable-item.selected { box-shadow: 0 0 0 4px #eab308; transform: scale(1.05); z-index: 10;}
        .drop-zone { transition: all 0.3s; border: 2px dashed rgba(255,255,255,0.3); }
        .drop-zone.highlight { background-color: rgba(20, 184, 166, 0.2); border-color: #14b8a6; }
        .drop-zone.active-target { border-color: #eab308; background-color: rgba(234, 179, 8, 0.1); box-shadow: 0 0 15px rgba(234,179,8,0.3) inset;}
        
        /* Perspective paths for Scene 1 */
        .path-container { perspective: 1000px; }
        .path { transform: rotateX(60deg); transform-origin: bottom center; }
        
        .hide { display: none !important; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-2 sm:p-4">

    <div id="app-container" class="w-full max-w-5xl h-full max-h-[900px] forest-bg rounded-2xl shadow-2xl overflow-hidden flex flex-col relative border border-gray-700">
        
        <!-- Header -->
        <header class="glass-panel p-4 flex justify-between items-center z-20">
            <div>
                <h1 class="text-xl sm:text-2xl font-bold text-teal-400 leading-tight">El Bosque de la Formación</h1>
                <p class="text-xs sm:text-sm text-gray-400">Módulo 3: ¿Quién soy y qué quiero aprender?</p>
            </div>
            <div class="flex items-center gap-2">
                <span id="scene-indicator" class="bg-teal-900 text-teal-300 text-xs font-bold px-3 py-1 rounded-full border border-teal-700">Escena 1/5</span>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="scene-container" class="flex-1 relative overflow-y-auto overflow-x-hidden p-4 sm:p-6 flex flex-col items-center">
            <!-- Scenes will be injected here via JS -->
        </main>

        <!-- Footer Navigation -->
        <footer class="glass-panel p-4 flex justify-between items-center z-20">
            <button id="btn-prev" class="px-4 py-2 rounded-lg font-semibold bg-gray-700 hover:bg-gray-600 text-white transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                <i class="fas fa-chevron-left"></i> Atrás
            </button>
            <button id="btn-next" class="px-6 py-2 rounded-lg font-bold bg-teal-600 hover:bg-teal-500 text-white shadow-lg transition-all transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                Siguiente <i class="fas fa-chevron-right"></i>
            </button>
        </footer>

        <!-- OSO Character SVG Definition (Hidden, used as template) -->
        <svg style="display:none;">
            <symbol id="oso-bear" viewBox="0 0 200 200">
                <!-- Body -->
                <path d="M50 200 C50 120, 150 120, 150 200" fill="#1e293b" />
                <!-- Vest -->
                <path d="M60 200 C60 140, 90 140, 90 200" fill="#b45309" />
                <path d="M140 200 C140 140, 110 140, 110 200" fill="#b45309" />
                <!-- Ears -->
                <circle cx="55" cy="65" r="15" fill="#1e293b" />
                <circle cx="55" cy="65" r="8" fill="#cbd5e1" />
                <circle cx="145" cy="65" r="15" fill="#1e293b" />
                <circle cx="145" cy="65" r="8" fill="#cbd5e1" />
                <!-- Head -->
                <path d="M60 130 C40 80, 70 50, 100 50 C130 50, 160 80, 140 130 C130 160, 70 160, 60 130 Z" fill="#1e293b" />
                <!-- Snout/Muzzle -->
                <ellipse cx="100" cy="115" rx="25" ry="20" fill="#f8fafc" />
                <path d="M100 130 C90 130, 90 140, 100 140 C110 140, 110 130, 100 130 Z" fill="#0f172a" />
                <path d="M100 140 L100 145 M90 148 C95 152, 105 152, 110 148" stroke="#0f172a" stroke-width="2" fill="none"/>
                <!-- Nose -->
                <path d="M90 105 Q100 100 110 105 L100 115 Z" fill="#0f172a"/>
                <!-- Eyes -->
                <circle cx="80" cy="90" r="12" fill="#f8fafc" />
                <circle cx="80" cy="90" r="5" fill="#0f172a" />
                <circle cx="120" cy="90" r="12" fill="#f8fafc" />
                <circle cx="120" cy="90" r="5" fill="#0f172a" />
                <!-- Glasses -->
                <circle cx="80" cy="90" r="14" fill="none" stroke="#eab308" stroke-width="3" />
                <circle cx="120" cy="90" r="14" fill="none" stroke="#eab308" stroke-width="3" />
                <line x1="94" y1="90" x2="106" y2="90" stroke="#eab308" stroke-width="3" />
                <!-- Hat -->
                <path d="M50 60 Q100 30 150 60" fill="none" stroke="#854d0e" stroke-width="8" stroke-linecap="round"/>
                <path d="M65 55 C65 20, 135 20, 135 55 Z" fill="#a16207" />
            </symbol>
        </svg>

        <!-- Modals Container -->
        <div id="modal-overlay" class="absolute inset-0 bg-black/80 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300">
            <div id="modal-content" class="bg-slate-800 border border-slate-600 rounded-xl p-6 max-w-2xl w-full shadow-2xl transform scale-95 transition-transform duration-300">
                <div class="flex justify-between items-start mb-4">
                    <h2 id="modal-title" class="text-2xl font-bold text-yellow-400">Título</h2>
                    <button id="btn-close-modal" class="text-gray-400 hover:text-white"><i class="fas fa-times text-xl"></i></button>
                </div>
                <div id="modal-body" class="text-slate-300 space-y-4">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data for Drag and Drop (Scene 2)
        const mitosData = [
            { id: 'm1', text: 'Alta demanda laboral en el sector productivo', target: 'tecnica' },
            { id: 'm2', text: 'Retorno de inversión más rápido (1-2 años)', target: 'tecnica' },
            { id: 'm3', text: 'Mayor tiempo de estudio (4-5 años o más)', target: 'uni' },
            { id: 'm4', text: 'Mercado saturado en ciertas áreas tradicionales', target: 'uni' },
            { id: 'm5', text: 'Alta expectativa de remuneración (no siempre inmediata)', target: 'uni' },
            { id: 'm6', text: 'Especialización técnica práctica para la industria', target: 'tecnica' }
        ];

        // Global State
        const state = {
            currentScene: 1,
            maxScenes: 5,
            scene2Completed: false,
            scene4Completed: false,
            selectedDraggableId: null // For mobile click-to-move fallback
        };

        // DOM Elements
        const DOM = {
            container: document.getElementById('scene-container'),
            btnNext: document.getElementById('btn-next'),
            btnPrev: document.getElementById('btn-prev'),
            indicator: document.getElementById('scene-indicator'),
            modalOverlay: document.getElementById('modal-overlay'),
            modalContent: document.getElementById('modal-content'),
            modalTitle: document.getElementById('modal-title'),
            modalBody: document.getElementById('modal-body'),
            btnCloseModal: document.getElementById('btn-close-modal')
        };

        const scenes = {
            1: () => `
                <div class="w-full h-full flex flex-col md:flex-row gap-6 animate-slide-up">
                    <div class="md:w-1/3 flex flex-col items-center justify-center z-10">
                        <svg class="w-48 h-48 md:w-64 md:h-64 animate-float drop-shadow-xl"><use href="#oso-bear"></use></svg>
                        <div class="mt-[-20px] bg-slate-800 p-4 rounded-xl border border-slate-600 shadow-lg relative">
                            <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 w-4 h-4 bg-slate-800 border-t border-l border-slate-600 rotate-45"></div>
                            <p class="text-sm md:text-base text-slate-200">
                                <span class="text-yellow-400 font-bold">¡Hola Guía!</span> Notarás que tus estudiantes suelen correr hacia el sendero más ancho porque creen que es el único que lleva al éxito.
                            </p>
                            <p class="text-sm md:text-base text-slate-200 mt-2">
                                Pero los datos nos dicen algo diferente. Tu misión hoy es aprender a mostrarles <span class="text-teal-400 font-bold">todo el bosque</span>.
                            </p>
                        </div>
                    </div>
                    <div class="md:w-2/3 relative rounded-xl overflow-hidden path-container bg-gradient-to-b from-blue-900/50 to-green-900/50 border border-slate-700 flex items-end justify-center pb-10">
                        <!-- Compass Icon -->
                        <div class="absolute top-4 right-4 text-yellow-500/50 text-6xl animate-pulse"><i class="far fa-compass"></i></div>
                        
                        <!-- Paths -->
                        <div class="absolute bottom-0 w-full h-full flex justify-center gap-4 px-4 path">
                            <!-- Tech 1 -->
                            <div class="w-1/4 h-full bg-gradient-to-t from-teal-400/80 to-transparent clip-path-trail flex items-end justify-center pb-8 hover:brightness-125 transition-all">
                                <span class="bg-teal-900/80 text-teal-100 text-xs px-2 py-1 rounded font-bold backdrop-blur-sm -rotate-90 origin-left translate-x-4">Técnica</span>
                            </div>
                            <!-- University -->
                            <div class="w-2/4 h-full bg-gradient-to-t from-slate-400/80 to-transparent clip-path-trail flex items-end justify-center pb-8 opacity-50">
                                <span class="bg-slate-800/80 text-slate-200 text-sm px-4 py-1 rounded font-bold backdrop-blur-sm mb-4">Universidad</span>
                            </div>
                            <!-- Tech 2 -->
                            <div class="w-1/4 h-full bg-gradient-to-t from-yellow-400/80 to-transparent clip-path-trail flex items-end justify-center pb-8 hover:brightness-125 transition-all">
                                <span class="bg-yellow-900/80 text-yellow-100 text-xs px-2 py-1 rounded font-bold backdrop-blur-sm rotate-90 origin-right -translate-x-4">Tecnológica</span>
                            </div>
                        </div>

                        <!-- Data Button -->
                        <button onclick="openModal('realidad')" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-bold py-3 px-6 rounded-full shadow-[0_0_15px_rgba(234,179,8,0.5)] transition-transform hover:scale-105 animate-pulse-glow z-20 flex items-center gap-2">
                            <i class="fas fa-chart-pie"></i> Ver Realidad vs. Mito
                        </button>
                    </div>
                </div>
                <style>
                    .clip-path-trail { clip-path: polygon(40% 0, 60% 0, 100% 100%, 0% 100%); }
                </style>
            `,
            2: () => `
                <div class="w-full h-full flex flex-col gap-4 animate-slide-up">
                    <div class="text-center mb-2">
                        <h2 class="text-xl md:text-2xl font-bold text-teal-400">Derribando Mitos en el Sendero</h2>
                        <p class="text-slate-300 text-sm">Ubica cada realidad del mercado en el árbol correspondiente. <br><span class="text-yellow-400 text-xs"><i class="fas fa-info-circle"></i> Toca una etiqueta y luego toca el árbol, o arrástrala.</span></p>
                    </div>
                    
                    <!-- Drop Zones (Trees) -->
                    <div class="flex-1 flex gap-2 md:gap-6 justify-center min-h-[180px]">
                        <div id="tree-tecnica" class="drop-zone flex-1 bg-teal-900/30 rounded-t-full rounded-b-lg border-2 border-teal-700/50 flex flex-col items-center p-2 pt-6 relative" data-target="tecnica" onclick="handleZoneClick('tecnica')">
                            <i class="fas fa-tree text-3xl md:text-5xl text-teal-500 mb-2 drop-shadow-md"></i>
                            <h3 class="font-bold text-teal-300 text-sm text-center">Técnica / Tecnológica</h3>
                            <div class="items-container w-full flex flex-col gap-2 mt-4"></div>
                        </div>
                        <div id="tree-uni" class="drop-zone flex-1 bg-slate-800/50 rounded-t-full rounded-b-lg border-2 border-slate-600/50 flex flex-col items-center p-2 pt-6 relative" data-target="uni" onclick="handleZoneClick('uni')">
                            <i class="fas fa-tree text-3xl md:text-5xl text-slate-400 mb-2 drop-shadow-md"></i>
                            <h3 class="font-bold text-slate-300 text-sm text-center">Universitaria</h3>
                            <div class="items-container w-full flex flex-col gap-2 mt-4"></div>
                        </div>
                    </div>

                    <!-- Draggable Items -->
                    <div class="bg-slate-800/80 p-4 rounded-xl border border-slate-700 min-h-[150px]">
                        <h4 class="text-xs uppercase text-slate-400 mb-3 tracking-wider font-bold">Realidades del Mercado (Selecciona o Arrastra)</h4>
                        <div id="drag-container" class="flex flex-wrap gap-2 justify-center">
                            ${mitosData.map(m => `
                                <div id="${m.id}" class="draggable-item bg-slate-700 hover:bg-slate-600 border border-slate-500 text-slate-200 text-xs md:text-sm py-2 px-3 rounded shadow cursor-grab active:cursor-grabbing text-center" draggable="true" data-target="${m.target}" onclick="handleItemClick('${m.id}')">
                                    ${m.text}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <!-- Feedback Area -->
                    <div id="s2-feedback" class="hidden bg-teal-900/50 border border-teal-500 text-teal-100 p-3 rounded-lg flex items-start gap-3 mt-2">
                        <svg class="w-12 h-12 flex-shrink-0"><use href="#oso-bear"></use></svg>
                        <p class="text-sm self-center">¡Excelente! Educar no es desanimar de la universidad, sino <strong>ampliar el menú</strong> para que el joven decida con base en la realidad.</p>
                    </div>
                </div>
            `,
            3: () => `
                <div class="w-full h-full flex flex-col animate-slide-up">
                    <h2 class="text-xl md:text-2xl font-bold text-yellow-400 mb-2 flex items-center gap-2">
                        <i class="fas fa-book-open"></i> Cartilla 2: Pasos de Facilitación
                    </h2>
                    <p class="text-slate-300 text-sm mb-4">Explora los pasos clave para guiar a los estudiantes en la sección "Grandes preguntas en el colegio".</p>
                    
                    <div class="flex-1 flex flex-col md:flex-row gap-4 bg-slate-800 border border-slate-600 rounded-xl overflow-hidden shadow-xl">
                        <!-- Tabs -->
                        <div class="w-full md:w-1/3 bg-slate-900 flex flex-row md:flex-col border-b md:border-b-0 md:border-r border-slate-700">
                            <button onclick="switchTab(1)" id="tab-1" class="tab-btn flex-1 md:flex-none text-left p-3 md:p-4 text-sm font-bold border-l-4 border-teal-500 bg-slate-800 text-white transition-colors">
                                <i class="fas fa-search mr-2"></i> 1. Investigar
                            </button>
                            <button onclick="switchTab(2)" id="tab-2" class="tab-btn flex-1 md:flex-none text-left p-3 md:p-4 text-sm font-bold border-l-4 border-transparent text-slate-400 hover:bg-slate-800/50 transition-colors">
                                <i class="fas fa-balance-scale mr-2"></i> 2. Comparar
                            </button>
                            <button onclick="switchTab(3)" id="tab-3" class="tab-btn flex-1 md:flex-none text-left p-3 md:p-4 text-sm font-bold border-l-4 border-transparent text-slate-400 hover:bg-slate-800/50 transition-colors">
                                <i class="fas fa-mountain mr-2"></i> 3. Superar
                            </button>
                        </div>
                        
                        <!-- Content -->
                        <div class="w-full md:w-2/3 p-4 md:p-6 relative">
                            <div id="tab-content-1" class="tab-content animate-slide-up">
                                <h3 class="text-lg font-bold text-teal-400 mb-3">La Investigación (Explorar el sistema)</h3>
                                <div class="bg-slate-900/50 p-4 rounded border border-slate-700 mb-4">
                                    <p class="text-slate-300 text-sm leading-relaxed">
                                        <strong>Objetivo:</strong> Dinamizar la búsqueda de requisitos de ingreso.
                                    </p>
                                </div>
                                <p class="text-slate-300 text-sm">
                                    El educador debe usar la actividad <em>"Investigando más profundo"</em> de la cartilla. No se trata solo de que el estudiante elija una carrera al azar, sino que entienda el ecosistema: ¿Qué instituciones existen? ¿Cuáles son los puntajes requeridos? ¿Cuáles son las fechas de admisión? <strong>La información es poder.</strong>
                                </p>
                            </div>
                            
                            <div id="tab-content-2" class="tab-content hidden animate-slide-up">
                                <h3 class="text-lg font-bold text-teal-400 mb-3">Comparar Caminos</h3>
                                <div class="bg-slate-900/50 p-4 rounded border border-slate-700 mb-4">
                                    <p class="text-slate-300 text-sm leading-relaxed">
                                        <strong>Objetivo:</strong> Analizar pros y contras de diferentes rutas.
                                    </p>
                                </div>
                                <p class="text-slate-300 text-sm mb-3">
                                    Utiliza las tablas comparativas de la cartilla para que los jóvenes contrasten:
                                </p>
                                <ul class="list-disc list-inside text-sm text-slate-300 space-y-1 ml-2">
                                    <li>Costos de matrícula y manutención.</li>
                                    <li>Duración de los programas (Técnico vs. Profesional).</li>
                                    <li>Perfiles de egreso y empleabilidad en la región.</li>
                                </ul>
                            </div>
                            
                            <div id="tab-content-3" class="tab-content hidden animate-slide-up">
                                <h3 class="text-lg font-bold text-teal-400 mb-3">Superar Obstáculos</h3>
                                <div class="bg-slate-900/50 p-4 rounded border border-slate-700 mb-4">
                                    <p class="text-slate-300 text-sm leading-relaxed">
                                        <strong>Objetivo:</strong> Facilitar conversaciones sobre barreras reales.
                                    </p>
                                </div>
                                <p class="text-slate-300 text-sm">
                                    Muchos jóvenes se desaniman por barreras económicas o falta de información. Como guía, debes mostrarles el camino para superar estos muros informando sobre: <strong>Becas locales, programas del ICETEX, subsidios de transporte, y apoyos regionales específicos.</strong> Transforma el "no puedo" en un "¿cómo lo logro?".
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            4: () => `
                <div class="w-full h-full flex flex-col animate-slide-up">
                    <h2 class="text-xl md:text-2xl font-bold text-teal-400 mb-4"><i class="fas fa-chalkboard-teacher"></i> Simulador de Diálogo</h2>
                    
                    <div class="flex-1 bg-slate-800 border border-slate-600 rounded-xl p-4 md:p-6 flex flex-col shadow-inner">
                        <!-- Student Bubble -->
                        <div class="flex items-end gap-4 mb-6">
                            <div class="w-12 h-12 rounded-full bg-indigo-500 flex items-center justify-center text-xl shadow-lg border-2 border-indigo-300 shrink-0">
                                <i class="fas fa-user-graduate"></i>
                            </div>
                            <div class="bg-indigo-900/50 border border-indigo-500/50 text-indigo-100 p-4 rounded-2xl rounded-bl-sm relative max-w-2xl">
                                <p class="text-sm md:text-base italic">"Profe, yo quiero estudiar Derecho porque suena importante, pero mi familia no tiene dinero y me da miedo no encontrar trabajo después de tantos años."</p>
                            </div>
                        </div>

                        <div class="mb-4">
                            <h3 class="text-yellow-400 font-bold text-sm uppercase tracking-wide">¿Cómo guiarías esta conversación usando la Cartilla 2?</h3>
                        </div>

                        <!-- Choices -->
                        <div id="sim-choices" class="space-y-3 flex-1">
                            <button onclick="handleSimChoice('A')" class="w-full text-left bg-slate-700 hover:bg-slate-600 border border-slate-500 p-4 rounded-lg transition-colors group">
                                <span class="font-bold text-slate-400 group-hover:text-white mr-2">A.</span>
                                <span class="text-sm md:text-base text-slate-200">"Dile que mejor busque una técnica administrativa que es más corta y barata para evitar problemas."</span>
                            </button>
                            <button onclick="handleSimChoice('B')" class="w-full text-left bg-slate-700 hover:bg-slate-600 border border-slate-500 p-4 rounded-lg transition-colors group">
                                <span class="font-bold text-slate-400 group-hover:text-white mr-2">B.</span>
                                <span class="text-sm md:text-base text-slate-200">"Invítala a investigar opciones de formación tecnológica en áreas jurídicas o administrativas, comparando la demanda laboral actual y costos."</span>
                            </button>
                        </div>

                        <!-- OSO Feedback (Hidden initially) -->
                        <div id="sim-feedback" class="hidden mt-6 bg-slate-900 border-2 rounded-xl p-4 flex items-start gap-4">
                            <svg class="w-16 h-16 shrink-0 drop-shadow-lg"><use href="#oso-bear"></use></svg>
                            <div>
                                <h4 id="sim-fb-title" class="font-bold text-lg mb-1"></h4>
                                <p id="sim-fb-text" class="text-sm text-slate-300"></p>
                            </div>
                        </div>
                    </div>
                </div>
            `,
            5: () => `
                <div class="w-full h-full flex flex-col items-center justify-center animate-slide-up text-center">
                    <div class="relative mb-8">
                        <svg class="w-40 h-40 md:w-56 md:h-56 z-10 relative drop-shadow-2xl"><use href="#oso-bear"></use></svg>
                        <!-- Lantern glow effect -->
                        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-yellow-400/20 rounded-full blur-3xl animate-pulse-glow z-0"></div>
                        <i class="fas fa-lantern text-5xl text-yellow-400 absolute bottom-0 -right-4 z-20 drop-shadow-[0_0_10px_rgba(234,179,8,0.8)] animate-float"></i>
                    </div>

                    <h2 class="text-2xl md:text-3xl font-extrabold text-white mb-4">Has recibido la <span class="text-yellow-400">Linterna de la Realidad</span></h2>
                    
                    <div class="bg-slate-800/80 border border-slate-600 p-6 rounded-xl max-w-2xl shadow-lg mb-8">
                        <p class="text-slate-200 text-sm md:text-base italic leading-relaxed">
                            "El bosque es grande y a veces oscuro, pero con información veraz, tus estudiantes podrán encontrar su propio camino. Recuerda, la Orientación Socio Ocupacional es un acto de <strong>justicia social</strong> al brindar información a quienes menos acceso tienen a ella. No olvides usar siempre las Guías de Temas por Grado."
                        </p>
                    </div>

                    <button onclick="downloadChecklist()" class="bg-gradient-to-r from-teal-500 to-emerald-500 hover:from-teal-400 hover:to-emerald-400 text-white font-bold py-3 px-8 rounded-full shadow-[0_0_20px_rgba(20,184,166,0.4)] transition-all transform hover:scale-105 flex items-center gap-3">
                        <i class="fas fa-file-download text-xl"></i>
                        Checklist del Guía
                    </button>
                    
                    <div id="download-msg" class="hidden mt-4 text-emerald-400 text-sm font-bold bg-emerald-900/30 px-4 py-2 rounded">
                        <i class="fas fa-check-circle"></i> ¡Checklist descargado correctamente!
                    </div>
                </div>
            `
        };

        function renderScene() {
            DOM.container.innerHTML = scenes[state.currentScene]();
            DOM.indicator.textContent = `Escena ${state.currentScene}/${state.maxScenes}`;
            
            // Update button states
            DOM.btnPrev.disabled = state.currentScene === 1;
            
            // Progression logic restrictions
            if (state.currentScene === 2 && !state.scene2Completed) {
                DOM.btnNext.disabled = true;
                setupDragAndDrop();
            } else if (state.currentScene === 4 && !state.scene4Completed) {
                DOM.btnNext.disabled = true;
            } else if (state.currentScene === 5) {
                DOM.btnNext.disabled = true;
                DOM.btnNext.classList.add('hide');
            } else {
                DOM.btnNext.disabled = false;
                DOM.btnNext.classList.remove('hide');
            }
        }

        // Navigation Handlers
        DOM.btnNext.addEventListener('click', () => {
            if (state.currentScene < state.maxScenes) {
                state.currentScene++;
                renderScene();
            }
        });

        DOM.btnPrev.addEventListener('click', () => {
            if (state.currentScene > 1) {
                state.currentScene--;
                renderScene();
            }
        });

        function openModal(type) {
            if (type === 'realidad') {
                DOM.modalTitle.textContent = "Datos del Bosque: Realidad vs. Mito";
                DOM.modalBody.innerHTML = `
                    <div class="space-y-6">
                        <div class="bg-slate-700/50 border-l-4 border-red-500 p-4 rounded">
                            <h4 class="font-bold text-red-400 mb-2 flex items-center gap-2"><i class="fas fa-times-circle"></i> El Gran Mito</h4>
                            <p class="text-sm">"La carrera profesional universitaria es la única vía segura para tener éxito y ganar bien."</p>
                        </div>
                        <div class="bg-teal-900/30 border-l-4 border-teal-500 p-4 rounded">
                            <h4 class="font-bold text-teal-400 mb-2 flex items-center gap-2"><i class="fas fa-check-circle"></i> La Realidad (Datos recientes EOE/GOYN)</h4>
                            <ul class="list-disc list-inside text-sm space-y-2 text-slate-200">
                                <li>Existe un <strong>gran desconocimiento</strong> de las rutas Técnicas y Tecnológicas entre los jóvenes.</li>
                                <li>Las carreras técnicas/tecnológicas tienen una <strong>alta demanda laboral</strong> en sectores productivos clave.</li>
                                <li>Ofrecen una <strong>competitividad salarial</strong> rápida con un retorno de inversión mucho menor en tiempo y dinero.</li>
                                <li>El tránsito inmediato a programas tecnológicos reduce el riesgo de deserción por frustración económica.</li>
                            </ul>
                        </div>
                        <p class="text-xs text-slate-400 italic text-center mt-4">* Datos de contexto basados en informes del Ecosistema Educativo y Empleabilidad Juvenil.</p>
                    </div>
                `;
            }
            DOM.modalOverlay.classList.remove('opacity-0', 'pointer-events-none');
            DOM.modalContent.classList.remove('scale-95');
            DOM.modalContent.classList.add('scale-100');
        }

        DOM.btnCloseModal.addEventListener('click', () => {
            DOM.modalOverlay.classList.add('opacity-0', 'pointer-events-none');
            DOM.modalContent.classList.remove('scale-100');
            DOM.modalContent.classList.add('scale-95');
        });

        function setupDragAndDrop() {
            const items = document.querySelectorAll('.draggable-item');
            const zones = document.querySelectorAll('.drop-zone');

            // HTML5 Drag events for Desktop
            items.forEach(item => {
                item.addEventListener('dragstart', e => {
                    e.dataTransfer.setData('text/plain', e.target.id);
                    e.target.classList.add('opacity-50');
                    // Reset selection if drag starts
                    clearSelection();
                });
                item.addEventListener('dragend', e => {
                    e.target.classList.remove('opacity-50');
                    checkCompletion();
                });
            });

            zones.forEach(zone => {
                zone.addEventListener('dragover', e => {
                    e.preventDefault();
                    zone.classList.add('highlight');
                });
                zone.addEventListener('dragleave', () => {
                    zone.classList.remove('highlight');
                });
                zone.addEventListener('drop', e => {
                    e.preventDefault();
                    zone.classList.remove('highlight');
                    const id = e.dataTransfer.getData('text/plain');
                    processDrop(id, zone.dataset.target, zone);
                });
            });
        }

        // Mobile/Click Fallback for Drag & Drop
        window.handleItemClick = function(id) {
            const item = document.getElementById(id);
            // Ignore if already placed correctly
            if(item.parentElement.classList.contains('items-container')) return;

            if (state.selectedDraggableId === id) {
                // Deselect
                clearSelection();
            } else {
                clearSelection();
                state.selectedDraggableId = id;
                item.classList.add('selected');
                // Highlight target zones
                document.querySelectorAll('.drop-zone').forEach(z => z.classList.add('active-target'));
            }
        };

        window.handleZoneClick = function(targetZoneType) {
            if (!state.selectedDraggableId) return;
            
            const zone = document.querySelector(`.drop-zone[data-target="${targetZoneType}"]`);
            processDrop(state.selectedDraggableId, targetZoneType, zone);
            clearSelection();
            checkCompletion();
        };

        function clearSelection() {
            state.selectedDraggableId = null;
            document.querySelectorAll('.draggable-item').forEach(i => i.classList.remove('selected'));
            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active-target'));
        }

        function processDrop(itemId, targetZoneType, zoneElement) {
            const item = document.getElementById(itemId);
            if (!item) return;

            const expectedTarget = item.dataset.target;
            
            if (expectedTarget === targetZoneType) {
                // Correct
                item.classList.remove('bg-slate-700', 'hover:bg-slate-600', 'border-slate-500', 'cursor-grab', 'active:cursor-grabbing');
                item.classList.add('bg-emerald-800/80', 'border-emerald-500', 'text-emerald-100', 'cursor-default');
                item.draggable = false;
                item.onclick = null; // remove click handler
                
                const container = zoneElement.querySelector('.items-container');
                container.appendChild(item);
                
                // Add tiny animation
                item.animate([{transform: 'scale(1.1)'}, {transform: 'scale(1)'}], {duration: 300});
            } else {
                // Incorrect - shake animation
                item.animate([
                    {transform: 'translateX(0)'}, {transform: 'translateX(-5px)'},
                    {transform: 'translateX(5px)'}, {transform: 'translateX(-5px)'},
                    {transform: 'translateX(5px)'}, {transform: 'translateX(0)'}
                ], {duration: 400});
                
                // Visual feedback of error
                const originalColor = item.style.backgroundColor;
                item.style.backgroundColor = '#7f1d1d'; // red
                setTimeout(() => item.style.backgroundColor = originalColor, 500);
            }
        }

        function checkCompletion() {
            const remainingInPool = document.getElementById('drag-container').children.length;
            if (remainingInPool === 0) {
                state.scene2Completed = true;
                document.getElementById('s2-feedback').classList.remove('hidden');
                DOM.btnNext.disabled = false;
            }
        }

        window.switchTab = function(tabId) {
            // Update buttons
            for(let i=1; i<=3; i++) {
                const btn = document.getElementById(`tab-${i}`);
                if(i === tabId) {
                    btn.classList.remove('border-transparent', 'text-slate-400', 'hover:bg-slate-800/50');
                    btn.classList.add('border-teal-500', 'bg-slate-800', 'text-white');
                } else {
                    btn.classList.add('border-transparent', 'text-slate-400', 'hover:bg-slate-800/50');
                    btn.classList.remove('border-teal-500', 'bg-slate-800', 'text-white');
                }
                
                // Update content
                const content = document.getElementById(`tab-content-${i}`);
                if(i === tabId) {
                    content.classList.remove('hidden');
                } else {
                    content.classList.add('hidden');
                }
            }
        };

        window.handleSimChoice = function(choice) {
            const fbBox = document.getElementById('sim-feedback');
            const fbTitle = document.getElementById('sim-fb-title');
            const fbText = document.getElementById('sim-fb-text');
            const buttons = document.getElementById('sim-choices').querySelectorAll('button');
            
            fbBox.classList.remove('hidden');
            fbBox.classList.remove('border-red-500', 'border-teal-500', 'bg-red-900/30', 'bg-teal-900/30');
            
            // Disable buttons after choice
            buttons.forEach(b => b.disabled = true);
            buttons.forEach(b => b.classList.add('opacity-50', 'cursor-not-allowed'));

            if (choice === 'A') {
                fbBox.classList.add('border-red-500', 'bg-red-900/30');
                fbTitle.className = 'font-bold text-lg mb-1 text-red-400';
                fbTitle.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Acercamiento Incorrecto';
                fbText.innerHTML = 'No estás validando el interés de la joven. Direccionarla únicamente por costo sin explorar áreas afines a sus intereses (como lo administrativo/jurídico) puede generar desmotivación. <em>Intenta de nuevo.</em>';
                
                // Allow retry
                setTimeout(() => {
                    fbBox.classList.add('hidden');
                    buttons.forEach(b => {
                        b.disabled = false;
                        b.classList.remove('opacity-50', 'cursor-not-allowed');
                    });
                }, 4000);
                
            } else if (choice === 'B') {
                fbBox.classList.add('border-teal-500', 'bg-teal-900/30');
                fbTitle.className = 'font-bold text-lg mb-1 text-teal-400';
                fbTitle.innerHTML = '<i class="fas fa-star"></i> ¡Bien hecho!';
                fbText.innerHTML = 'Al mostrarle la opción Tecnológica dentro de sus áreas de interés, le das una ruta de tránsito inmediato al trabajo que luego puede homologar para su meta profesional (Derecho), reduciendo la frustración y el riesgo de deserción.';
                
                state.scene4Completed = true;
                DOM.btnNext.disabled = false;
                
                // Highlight correct button
                buttons[1].classList.remove('opacity-50');
                buttons[1].classList.add('ring-2', 'ring-teal-500', 'bg-teal-900/20');
            }
        };

        window.downloadChecklist = function() {
            DOM.modalTitle.textContent = "Checklist del Guía: Mitos vs. Realidades";
            DOM.modalBody.innerHTML = `
                <div class="space-y-4">
                    <div class="bg-teal-900/30 border-l-4 border-teal-500 p-4 rounded">
                        <ul class="list-none space-y-3 text-sm text-slate-200">
                            <li class="flex items-start gap-2">
                                <i class="fas fa-check text-teal-400 mt-1"></i>
                                <span>Validar intereses antes de descartar opciones.</span>
                            </li>
                            <li class="flex items-start gap-2">
                                <i class="fas fa-check text-teal-400 mt-1"></i>
                                <span>Explorar rutas técnicas/tecnológicas con los estudiantes.</span>
                            </li>
                            <li class="flex items-start gap-2">
                                <i class="fas fa-check text-teal-400 mt-1"></i>
                                <span>Comparar costos y tiempos de manera realista.</span>
                            </li>
                            <li class="flex items-start gap-2">
                                <i class="fas fa-check text-teal-400 mt-1"></i>
                                <span>Informar sobre becas y financiación (ICETEX, locales).</span>
                            </li>
                            <li class="flex items-start gap-2">
                                <i class="fas fa-check text-teal-400 mt-1"></i>
                                <span>Recordar que la OSO es un acto de justicia social.</span>
                            </li>
                        </ul>
                    </div>
                </div>
            `;
            DOM.modalOverlay.classList.remove('opacity-0', 'pointer-events-none');
            DOM.modalContent.classList.remove('scale-95');
            DOM.modalContent.classList.add('scale-100');
        };

        // Initialize App
        window.onload = () => {
            renderScene();
        };

    </script>
</body>
</html>
