<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Rol de Guía en el Bosque de la Formación</title>
    <link rel="icon" type="image/x-icon" href="imgs/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        oso: {
                            dark: '#1e293b', // Deep blue/black for bear body
                            light: '#f8fafc', // White for face
                            accent: '#d97706', // Brown/Orange for vest/hat
                            bg: '#14b8a6' // Teal background reference
                        }
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.5s ease-out forwards'
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        'pulse-glow': {
                            '0%, 100%': { opacity: 1, filter: 'drop-shadow(0 0 8px rgba(234,179,8,0.6))' },
                            '50%': { opacity: .7, filter: 'drop-shadow(0 0 2px rgba(234,179,8,0.2))' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: 0 },
                            '100%': { transform: 'translateY(0)', opacity: 1 },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #f8fffe 0%, #eef6ff 100%); color: #1e293b; overflow: hidden; }
        .forest-bg {
            background:
                radial-gradient(circle at top left, rgba(45, 212, 191, 0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(96, 165, 250, 0.15), transparent 26%),
                linear-gradient(to bottom, #f8fffe 0%, #f5fdfb 30%, #ffffff 100%);
            position: relative;
        }
        .forest-bg::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px; opacity: 0.5; pointer-events: none;
        }
        
        /* Drag and drop custom styles for mobile fallback */
        .draggable-item { cursor: pointer; transition: all 0.2s; }
        .draggable-item:hover { transform: scale(1.02); }
        .draggable-item.selected { box-shadow: 0 0 0 4px #eab308; transform: scale(1.05); z-index: 10;}
        .drop-zone { transition: all 0.3s; border: 2px dashed rgba(0,0,0,0.15); }
        .drop-zone.highlight { background-color: rgba(20, 184, 166, 0.1); border-color: #0d9488; }
        .drop-zone.active-target { border-color: #ca8a04; background-color: rgba(234, 179, 8, 0.08); box-shadow: 0 0 15px rgba(234,179,8,0.15) inset;}
        
        /* Perspective paths for Scene 1 */
        .path-container { perspective: 1000px; }
        .path { transform: rotateX(60deg); transform-origin: bottom center; }
        
        .hide { display: none !important; }
        .glass-panel { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(14px); border: 1px solid rgba(148, 163, 184, 0.18); box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08); }
        .hero-card { background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.88)); border: 1px solid rgba(148, 163, 184, 0.18); box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08); }
        .soft-card { background: rgba(255,255,255,0.9); border: 1px solid rgba(148, 163, 184, 0.2); box-shadow: 0 14px 28px rgba(15, 23, 42, 0.06); }
        .gradient-chip { background: linear-gradient(90deg, #14b8a6, #3b82f6); color: #fff; }
        .image-placeholder {
            background: linear-gradient(135deg, rgba(20,184,166,0.12), rgba(59,130,246,0.10));
            border: 2px dashed rgba(20, 184, 166, 0.35);
        }
        .scene-grid { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 1rem; width: 100%; }
        .myth-token { box-shadow: 0 10px 18px rgba(15, 23, 42, 0.08); }
        .myth-token.correct { background: linear-gradient(135deg, #047857, #10b981); color: #ecfdf5; border-color: #10b981; }
        .myth-token.error { background: #fee2e2; border-color: #fca5a5; color: #991b1b; }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-2 sm:p-4">

    <div id="app-container" class="w-full max-w-[1440px] h-full max-h-[900px] forest-bg rounded-2xl shadow-2xl overflow-hidden flex flex-col relative border border-gray-200">
        
        <!-- Header -->
        <header class="glass-panel p-4 flex justify-between items-center z-20">
            <div>
                <h1 class="text-xl sm:text-2xl font-bold text-teal-700 leading-tight">El Bosque de la Formación</h1>
                <p class="text-xs sm:text-sm text-gray-500">Módulo 3: ¿Quién soy y qué quiero aprender?</p>
            </div>
            <div class="flex items-center gap-2">
                <span id="scene-indicator" class="bg-teal-50 text-teal-700 text-xs font-bold px-3 py-1 rounded-full border border-teal-200">Escena 1/5</span>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="scene-container" class="flex-1 relative overflow-y-auto overflow-x-hidden p-4 sm:p-6 flex flex-col items-center">
            <!-- Scenes will be injected here via JS -->
        </main>

        <!-- Footer Navigation -->
        <footer class="glass-panel p-4 flex justify-between items-center z-20">
            <button id="btn-prev" class="px-4 py-2 rounded-lg font-semibold bg-gray-100 hover:bg-gray-200 text-gray-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                <i class="fas fa-chevron-left"></i> Atrás
            </button>
            <button id="btn-next" class="px-6 py-2 rounded-lg font-bold bg-teal-600 hover:bg-teal-500 text-white shadow-lg transition-all transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                Siguiente <i class="fas fa-chevron-right"></i>
            </button>
        </footer>

        <!-- OSO Character SVG Definition (Hidden, used as template) -->
        <svg style="display:none;">
            <symbol id="oso-bear" viewBox="0 0 200 200">
                <!-- Body -->
                <path d="M50 200 C50 120, 150 120, 150 200" fill="#1e293b" />
                <!-- Vest -->
                <path d="M60 200 C60 140, 90 140, 90 200" fill="#b45309" />
                <path d="M140 200 C140 140, 110 140, 110 200" fill="#b45309" />
                <!-- Ears -->
                <circle cx="55" cy="65" r="15" fill="#1e293b" />
                <circle cx="55" cy="65" r="8" fill="#cbd5e1" />
                <circle cx="145" cy="65" r="15" fill="#1e293b" />
                <circle cx="145" cy="65" r="8" fill="#cbd5e1" />
                <!-- Head -->
                <path d="M60 130 C40 80, 70 50, 100 50 C130 50, 160 80, 140 130 C130 160, 70 160, 60 130 Z" fill="#1e293b" />
                <!-- Snout/Muzzle -->
                <ellipse cx="100" cy="115" rx="25" ry="20" fill="#f8fafc" />
                <path d="M100 130 C90 130, 90 140, 100 140 C110 140, 110 130, 100 130 Z" fill="#0f172a" />
                <path d="M100 140 L100 145 M90 148 C95 152, 105 152, 110 148" stroke="#0f172a" stroke-width="2" fill="none"/>
                <!-- Nose -->
                <path d="M90 105 Q100 100 110 105 L100 115 Z" fill="#0f172a"/>
                <!-- Eyes -->
                <circle cx="80" cy="90" r="12" fill="#f8fafc" />
                <circle cx="80" cy="90" r="5" fill="#0f172a" />
                <circle cx="120" cy="90" r="12" fill="#f8fafc" />
                <circle cx="120" cy="90" r="5" fill="#0f172a" />
                <!-- Glasses -->
                <circle cx="80" cy="90" r="14" fill="none" stroke="#eab308" stroke-width="3" />
                <circle cx="120" cy="90" r="14" fill="none" stroke="#eab308" stroke-width="3" />
                <line x1="94" y1="90" x2="106" y2="90" stroke="#eab308" stroke-width="3" />
                <!-- Hat -->
                <path d="M50 60 Q100 30 150 60" fill="none" stroke="#854d0e" stroke-width="8" stroke-linecap="round"/>
                <path d="M65 55 C65 20, 135 20, 135 55 Z" fill="#a16207" />
            </symbol>
        </svg>

        <!-- Modals Container -->
        <div id="modal-overlay" class="absolute inset-0 bg-black/40 z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300">
            <div id="modal-content" class="bg-white border border-gray-200 rounded-xl p-6 max-w-2xl w-full shadow-2xl transform scale-95 transition-transform duration-300">
                <div class="flex justify-between items-start mb-4">
                    <h2 id="modal-title" class="text-2xl font-bold text-amber-600">Título</h2>
                    <button id="btn-close-modal" class="text-gray-400 hover:text-gray-700"><i class="fas fa-times text-xl"></i></button>
                </div>
                <div id="modal-body" class="text-slate-600 space-y-4">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data for Drag and Drop (Scene 2)
        const mitosData = [
            { id: 'm1', text: 'Alta demanda laboral en el sector productivo', target: 'tecnica' },
            { id: 'm2', text: 'Retorno de inversión más rápido (1-2 años)', target: 'tecnica' },
            { id: 'm3', text: 'Mayor tiempo de estudio (4-5 años o más)', target: 'uni' },
            { id: 'm4', text: 'Mercado saturado en ciertas áreas tradicionales', target: 'uni' },
            { id: 'm5', text: 'Alta expectativa de remuneración (no siempre inmediata)', target: 'uni' },
            { id: 'm6', text: 'Especialización técnica práctica para la industria', target: 'tecnica' }
        ];

        // Global State
        const state = {
            currentScene: 1,
            maxScenes: 5,
            scene2Completed: false,
            scene4Completed: false,
            selectedDraggableId: null // For mobile click-to-move fallback
        };

        // DOM Elements
        const DOM = {
            container: document.getElementById('scene-container'),
            btnNext: document.getElementById('btn-next'),
            btnPrev: document.getElementById('btn-prev'),
            indicator: document.getElementById('scene-indicator'),
            modalOverlay: document.getElementById('modal-overlay'),
            modalContent: document.getElementById('modal-content'),
            modalTitle: document.getElementById('modal-title'),
            modalBody: document.getElementById('modal-body'),
            btnCloseModal: document.getElementById('btn-close-modal')
        };

        const scenes = {
            1: () => `
                <div class="w-full h-full flex flex-col gap-6 animate-slide-up">
                    <div class="hero-card rounded-[28px] p-5 md:p-7 relative overflow-hidden">
                        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,_rgba(20,184,166,0.14),_transparent_32%),radial-gradient(circle_at_bottom_right,_rgba(59,130,246,0.12),_transparent_30%)]"></div>
                        <div class="relative scene-grid items-center">
                            <div class="col-span-12 md:col-span-4 flex flex-col items-center md:items-start gap-4">
                                <span class="gradient-chip text-xs font-bold px-4 py-2 rounded-full uppercase tracking-[0.2em]">Experiencia guiada</span>
                                <svg class="w-44 h-44 md:w-56 md:h-56 animate-float drop-shadow-xl"><use href="#oso-bear"></use></svg>
                                <div class="soft-card rounded-2xl p-4 text-sm md:text-base text-slate-700 leading-relaxed">
                                    <span class="text-amber-600 font-bold">¡Hola Guía!</span> Tus estudiantes no siempre ven todas las opciones. Tu rol es abrir posibilidades y convertir la información en orientación útil.
                                </div>
                            </div>
                            <div class="col-span-12 md:col-span-8 grid md:grid-cols-[1.2fr_0.8fr] gap-4 items-stretch">
                                <div class="soft-card rounded-[24px] p-5 border border-teal-100">
                                    <h2 class="text-2xl md:text-4xl font-extrabold text-slate-800 leading-tight mb-3">Guiar no es empujar a un solo camino.</h2>
                                    <p class="text-slate-600 text-sm md:text-base mb-4">Muestra el bosque completo: rutas universitarias, tecnológicas y técnicas con datos reales, tiempos, costos y oportunidades.</p>
                                    <div class="flex flex-wrap gap-2 mb-4">
                                        <span class="bg-teal-50 text-teal-700 px-3 py-2 rounded-full text-xs font-semibold">Decisión informada</span>
                                        <span class="bg-sky-50 text-sky-700 px-3 py-2 rounded-full text-xs font-semibold">Comparación de rutas</span>
                                        <span class="bg-amber-50 text-amber-700 px-3 py-2 rounded-full text-xs font-semibold">Justicia social</span>
                                    </div>
                                    <button onclick="openModal('realidad')" class="bg-amber-500 hover:bg-amber-400 text-white font-bold py-3 px-6 rounded-full shadow-[0_10px_30px_rgba(234,179,8,0.28)] transition-transform hover:scale-105 flex items-center gap-2">
                                        <i class="fas fa-chart-pie"></i> Ver Realidad vs. Mito
                                    </button>
                                </div>
                                <div class="soft-card rounded-[24px] p-4">
                                    <div class="image-placeholder rounded-2xl h-40 md:h-52 flex flex-col items-center justify-center text-center p-4">
                                        <i class="fas fa-image text-3xl text-teal-600 mb-2"></i>
                                        <p class="font-bold text-slate-700">Espacio sugerido para ilustración principal</p>
                                        <p class="text-xs text-slate-500 mt-1">Medida recomendada: 1200 x 900 px</p>
                                        <p class="text-xs text-slate-500">Tema: bosque educativo con varios senderos</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="soft-card rounded-[28px] p-4 md:p-6 relative overflow-hidden path-container min-h-[260px] md:min-h-[320px]">
                        <div class="absolute top-5 right-5 text-amber-400/60 text-5xl animate-pulse"><i class="far fa-compass"></i></div>
                        <div class="absolute inset-x-0 bottom-0 h-32 bg-gradient-to-t from-emerald-100 to-transparent"></div>
                        <div class="absolute bottom-0 w-full h-full flex justify-center gap-4 px-4 path">
                            <div class="w-1/4 h-full bg-gradient-to-t from-teal-400/65 to-transparent clip-path-trail flex items-end justify-center pb-8 hover:brightness-110 transition-all">
                                <span class="bg-teal-600/90 text-white text-xs px-2 py-1 rounded font-bold backdrop-blur-sm -rotate-90 origin-left translate-x-4">Técnica</span>
                            </div>
                            <div class="w-2/4 h-full bg-gradient-to-t from-slate-300/70 to-transparent clip-path-trail flex items-end justify-center pb-8 opacity-60">
                                <span class="bg-slate-600/90 text-white text-sm px-4 py-1 rounded font-bold backdrop-blur-sm mb-4">Universidad</span>
                            </div>
                            <div class="w-1/4 h-full bg-gradient-to-t from-yellow-400/65 to-transparent clip-path-trail flex items-end justify-center pb-8 hover:brightness-110 transition-all">
                                <span class="bg-amber-600/90 text-white text-xs px-2 py-1 rounded font-bold backdrop-blur-sm rotate-90 origin-right -translate-x-4">Tecnológica</span>
                            </div>
                        </div>
                    </div>
                </div>
                <style>
                    .clip-path-trail { clip-path: polygon(40% 0, 60% 0, 100% 100%, 0% 100%); }
                </style>
            `,
            2: () => `
                <div class="w-full h-full flex flex-col gap-4 animate-slide-up">
                    <div class="hero-card rounded-[28px] p-5 md:p-6">
                        <div class="flex flex-col lg:flex-row gap-5 lg:items-start lg:justify-between">
                            <div class="max-w-3xl">
                                <span class="gradient-chip text-xs font-bold px-4 py-2 rounded-full uppercase tracking-[0.18em]">Actividad interactiva</span>
                                <h2 class="text-2xl md:text-3xl font-extrabold text-slate-800 mt-4">Derribando Mitos en el Sendero</h2>
                                <p class="text-slate-600 text-sm md:text-base mt-2">Clasifica cada afirmación según la ruta formativa a la que corresponde. La idea es que el docente visualice, compare y explique por qué no todos los caminos responden a las mismas realidades.</p>
                            </div>
                            <div class="soft-card rounded-2xl p-4 min-w-[260px] max-w-sm">
                                <h3 class="text-sm font-bold text-slate-800 mb-2">Cómo facilitar la actividad</h3>
                                <ol class="text-sm text-slate-600 space-y-2 list-decimal list-inside">
                                    <li>Lee en voz alta cada tarjeta.</li>
                                    <li>Pide al grupo justificar su elección.</li>
                                    <li>Cierra con una reflexión sobre rutas diversas.</li>
                                </ol>
                            </div>
                        </div>
                    </div>

                    <div class="scene-grid items-start">
                        <div class="col-span-12 lg:col-span-8 soft-card rounded-[28px] p-4 md:p-5">
                            <div class="grid md:grid-cols-2 gap-4 min-h-[320px]">
                                <div id="tree-tecnica" class="drop-zone rounded-[24px] border-2 border-teal-200 bg-gradient-to-b from-teal-50 to-emerald-50 p-4 md:p-5 relative" data-target="tecnica" onclick="handleZoneClick('tecnica')">
                                    <div class="flex items-center gap-3 mb-3">
                                        <div class="w-12 h-12 rounded-2xl bg-teal-600 text-white flex items-center justify-center shadow-lg"><i class="fas fa-tools"></i></div>
                                        <div>
                                            <h3 class="font-bold text-teal-800 text-base">Ruta Técnica / Tecnológica</h3>
                                            <p class="text-xs text-teal-700">Inserción laboral y aplicación práctica</p>
                                        </div>
                                    </div>
                                    <div class="image-placeholder rounded-2xl h-24 mb-4 flex flex-col items-center justify-center text-center px-3">
                                        <p class="text-xs font-semibold text-teal-800">Espacio para imagen o iconografía</p>
                                        <p class="text-[11px] text-teal-700">Medida: 900 x 500 px</p>
                                    </div>
                                    <div class="items-container w-full flex flex-col gap-2 mt-2"></div>
                                </div>
                                <div id="tree-uni" class="drop-zone rounded-[24px] border-2 border-indigo-200 bg-gradient-to-b from-indigo-50 to-slate-50 p-4 md:p-5 relative" data-target="uni" onclick="handleZoneClick('uni')">
                                    <div class="flex items-center gap-3 mb-3">
                                        <div class="w-12 h-12 rounded-2xl bg-indigo-600 text-white flex items-center justify-center shadow-lg"><i class="fas fa-university"></i></div>
                                        <div>
                                            <h3 class="font-bold text-indigo-800 text-base">Ruta Universitaria</h3>
                                            <p class="text-xs text-indigo-700">Trayectorias largas y proyección profesional</p>
                                        </div>
                                    </div>
                                    <div class="image-placeholder rounded-2xl h-24 mb-4 flex flex-col items-center justify-center text-center px-3 border-indigo-200">
                                        <p class="text-xs font-semibold text-indigo-800">Espacio para imagen o iconografía</p>
                                        <p class="text-[11px] text-indigo-700">Medida: 900 x 500 px</p>
                                    </div>
                                    <div class="items-container w-full flex flex-col gap-2 mt-2"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-span-12 lg:col-span-4 flex flex-col gap-4">
                            <div class="soft-card rounded-[28px] p-4 md:p-5">
                                <h4 class="text-xs uppercase text-slate-500 mb-3 tracking-wider font-bold">Tarjetas de decisión</h4>
                                <div id="drag-container" class="flex flex-wrap gap-2 justify-center lg:justify-start">
                            ${mitosData.map(m => `
                                <div id="${m.id}" class="draggable-item myth-token bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 text-xs md:text-sm py-3 px-3 rounded-2xl shadow-sm cursor-grab active:cursor-grabbing text-center" draggable="true" data-target="${m.target}" onclick="handleItemClick('${m.id}')">
                                    ${m.text}
                                </div>
                            `).join('')}
                                </div>
                                <p class="text-xs text-slate-500 mt-3"><i class="fas fa-hand-pointer text-amber-500"></i> En móvil: toca una tarjeta y luego toca una ruta.</p>
                            </div>
                            <div class="soft-card rounded-[28px] p-4">
                                <h4 class="font-bold text-slate-800 mb-2">Recurso visual recomendado</h4>
                                <div class="image-placeholder rounded-2xl h-36 flex flex-col items-center justify-center text-center p-4">
                                    <i class="fas fa-layer-group text-3xl text-sky-600 mb-2"></i>
                                    <p class="text-sm font-semibold text-slate-700">Infografía comparativa de rutas</p>
                                    <p class="text-xs text-slate-500 mt-1">Medida sugerida: 1080 x 1350 px</p>
                                    <p class="text-xs text-slate-500">Uso: apoyo lateral o modal ampliado</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="s2-feedback" class="hidden bg-teal-50 border border-teal-300 text-teal-800 p-4 rounded-2xl flex items-start gap-3 mt-2 soft-card">
                        <svg class="w-12 h-12 flex-shrink-0"><use href="#oso-bear"></use></svg>
                        <p class="text-sm self-center">¡Excelente! Educar no es desanimar de la universidad, sino <strong>ampliar el menú</strong> para que cada joven decida con base en la realidad, sus intereses y su contexto.</p>
                    </div>
                </div>
            `,
            3: () => `
                <div class="w-full h-full flex flex-col animate-slide-up">
                    <h2 class="text-xl md:text-2xl font-bold text-amber-600 mb-2 flex items-center gap-2">
                        <i class="fas fa-book-open"></i> Cartilla 2: Pasos de Facilitación
                    </h2>
                    <p class="text-slate-600 text-sm mb-4">Explora los pasos clave para guiar a los estudiantes en la sección "Grandes preguntas en el colegio".</p>
                    
                    <div class="flex-1 flex flex-col md:flex-row gap-4 bg-white border border-gray-200 rounded-xl overflow-hidden shadow-lg">
                        <!-- Tabs -->
                        <div class="w-full md:w-1/3 bg-slate-50 flex flex-row md:flex-col border-b md:border-b-0 md:border-r border-gray-200">
                            <button onclick="switchTab(1)" id="tab-1" class="tab-btn flex-1 md:flex-none text-left p-3 md:p-4 text-sm font-bold border-l-4 border-teal-500 bg-white text-slate-800 transition-colors">
                                <i class="fas fa-search mr-2"></i> 1. Investigar
                            </button>
                            <button onclick="switchTab(2)" id="tab-2" class="tab-btn flex-1 md:flex-none text-left p-3 md:p-4 text-sm font-bold border-l-4 border-transparent text-slate-500 hover:bg-white transition-colors">
                                <i class="fas fa-balance-scale mr-2"></i> 2. Comparar
                            </button>
                            <button onclick="switchTab(3)" id="tab-3" class="tab-btn flex-1 md:flex-none text-left p-3 md:p-4 text-sm font-bold border-l-4 border-transparent text-slate-500 hover:bg-white transition-colors">
                                <i class="fas fa-mountain mr-2"></i> 3. Superar
                            </button>

        function renderScene() {
            DOM.container.innerHTML = scenes[state.currentScene]();
            DOM.indicator.textContent = `Escena ${state.currentScene}/${state.maxScenes}`;
            
            // Update button states
            DOM.btnPrev.disabled = state.currentScene === 1;
            
            // Progression logic restrictions
            if (state.currentScene === 2 && !state.scene2Completed) {
                DOM.btnNext.disabled = true;
                setupDragAndDrop();
            } else if (state.currentScene === 4 && !state.scene4Completed) {
                DOM.btnNext.disabled = true;
            } else if (state.currentScene === 5) {
                DOM.btnNext.disabled = true;
                DOM.btnNext.classList.add('hide');
            } else {
                DOM.btnNext.disabled = false;
                DOM.btnNext.classList.remove('hide');
            }
        }

        // Navigation Handlers
        DOM.btnNext.addEventListener('click', () => {
            if (state.currentScene < state.maxScenes) {
                state.currentScene++;
                renderScene();
            }
        });

        DOM.btnPrev.addEventListener('click', () => {
            if (state.currentScene > 1) {
                state.currentScene--;
                renderScene();
            }
        });

        function openModal(type) {
            if (type === 'realidad') {
                DOM.modalTitle.textContent = "Datos del Bosque: Realidad vs. Mito";

                        </div>
                        <div class="bg-teal-50 border-l-4 border-teal-500 p-4 rounded-2xl">
                            <h4 class="font-bold text-teal-700 mb-2 flex items-center gap-2"><i class="fas fa-check-circle"></i> La Realidad (Datos recientes EOE/GOYN)</h4>

                                <li>Existe un <strong>gran desconocimiento</strong> de las rutas Técnicas y Tecnológicas entre los jóvenes.</li>
                                <li>Las carreras técnicas/tecnológicas tienen una <strong>alta demanda laboral</strong> en sectores productivos clave.</li>
                                <li>Ofrecen una <strong>competitividad salarial</strong> rápida con un retorno de inversión mucho menor en tiempo y dinero.</li>
                                <li>El tránsito inmediato a programas tecnológicos reduce el riesgo de deserción por frustración económica.</li>
                            </ul>
                        </div>
                        <div class="image-placeholder rounded-2xl p-4 text-center">
                            <p class="text-sm font-semibold text-slate-700">Espacio sugerido para gráfico comparativo</p>
                            <p class="text-xs text-slate-500 mt-1">Medida recomendada: 1400 x 900 px</p>
                        </div>
                        <p class="text-xs text-slate-500 italic text-center mt-4">* Datos de contexto basados en informes del Ecosistema Educativo y Empleabilidad Juvenil.</p>
                    </div>
                `;
            }
            DOM.modalOverlay.classList.remove('opacity-0', 'pointer-events-none');
            DOM.modalContent.classList.remove('scale-95');
            DOM.modalContent.classList.add('scale-100');
        }

        DOM.btnCloseModal.addEventListener('click', () => {
            DOM.modalOverlay.classList.add('opacity-0', 'pointer-events-none');
            DOM.modalContent.classList.remove('scale-100');
            DOM.modalContent.classList.add('scale-95');
        });

        function setupDragAndDrop() {
            const items = document.querySelectorAll('.draggable-item');
            const zones = document.querySelectorAll('.drop-zone');

            // HTML5 Drag events for Desktop
            items.forEach(item => {
                item.addEventListener('dragstart', e => {
                    e.dataTransfer.setData('text/plain', e.target.id);
                    e.target.classList.add('opacity-50');
                    // Reset selection if drag starts
                    clearSelection();
                });
                item.addEventListener('dragend', e => {
                    e.target.classList.remove('opacity-50');
                    checkCompletion();
                });
            });

            zones.forEach(zone => {
                zone.addEventListener('dragover', e => {
                    e.preventDefault();
                    zone.classList.add('highlight');
                });
                zone.addEventListener('dragleave', () => {
                    zone.classList.remove('highlight');
                });
                zone.addEventListener('drop', e => {
                    e.preventDefault();
                    zone.classList.remove('highlight');
                    const id = e.dataTransfer.getData('text/plain');
                    processDrop(id, zone.dataset.target, zone);
                });
            });
        }

        // Mobile/Click Fallback for Drag & Drop
        window.handleItemClick = function(id) {
            const item = document.getElementById(id);
            // Ignore if already placed correctly
            if(item.parentElement.classList.contains('items-container')) return;

            if (state.selectedDraggableId === id) {
                // Deselect
                clearSelection();
            } else {
                clearSelection();
                state.selectedDraggableId = id;
                item.classList.add('selected');
                // Highlight target zones
                document.querySelectorAll('.drop-zone').forEach(z => z.classList.add('active-target'));
            }
        };

        window.handleZoneClick = function(targetZoneType) {
            if (!state.selectedDraggableId) return;
            
            const zone = document.querySelector(`.drop-zone[data-target="${targetZoneType}"]`);
            processDrop(state.selectedDraggableId, targetZoneType, zone);
            clearSelection();
            checkCompletion();
        };

        function clearSelection() {
            state.selectedDraggableId = null;
            document.querySelectorAll('.draggable-item').forEach(i => i.classList.remove('selected'));
            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active-target'));
        }

        function processDrop(itemId, targetZoneType, zoneElement) {
            const item = document.getElementById(itemId);
            if (!item) return;

            const expectedTarget = item.dataset.target;
            
            if (expectedTarget === targetZoneType) {
                // Correct
                item.classList.remove('bg-slate-50', 'hover:bg-slate-100', 'bg-white', 'hover:bg-slate-50', 'border-slate-200', 'text-slate-700', 'cursor-grab', 'active:cursor-grabbing');
                item.classList.add('correct', 'cursor-default');
                item.draggable = false;
                item.onclick = null; // remove click handler
                
                const container = zoneElement.querySelector('.items-container');
                container.appendChild(item);
                
                // Add tiny animation
                item.animate([{transform: 'scale(1.1)'}, {transform: 'scale(1)'}], {duration: 300});
            } else {
                // Incorrect - shake animation
                item.animate([
                    {transform: 'translateX(0)'}, {transform: 'translateX(-5px)'},
                    {transform: 'translateX(5px)'}, {transform: 'translateX(-5px)'},
                    {transform: 'translateX(5px)'}, {transform: 'translateX(0)'}
                ], {duration: 400});
                
                // Visual feedback of error
                item.classList.add('error');
                setTimeout(() => item.classList.remove('error'), 600);
            }
        }

        function checkCompletion() {
            const remainingInPool = document.getElementById('drag-container').children.length;
            if (remainingInPool === 0) {
                state.scene2Completed = true;
                document.getElementById('s2-feedback').classList.remove('hidden');
                DOM.btnNext.disabled = false;
            }
        }

        window.switchTab = function(tabId) {
            // Update buttons
            for(let i=1; i<=3; i++) {
                const btn = document.getElementById(`tab-${i}`);
                if(i === tabId) {
                    btn.classList.remove('border-transparent', 'text-slate-500', 'hover:bg-white');
                    btn.classList.add('border-teal-500', 'bg-white', 'text-slate-800');
                } else {
                    btn.classList.add('border-transparent', 'text-slate-500', 'hover:bg-white');
                    btn.classList.remove('border-teal-500', 'bg-white', 'text-slate-800');
                }
                
                // Update content
                const content = document.getElementById(`tab-content-${i}`);
                if(i === tabId) {
                    content.classList.remove('hidden');
                } else {
                    content.classList.add('hidden');
                }
            }
        };

        window.handleSimChoice = function(choice) {
            const fbBox = document.getElementById('sim-feedback');
            const fbTitle = document.getElementById('sim-fb-title');
            const fbText = document.getElementById('sim-fb-text');
            const buttons = document.getElementById('sim-choices').querySelectorAll('button');
            
            fbBox.classList.remove('hidden');
            fbBox.classList.remove('border-red-300', 'border-teal-300', 'bg-red-50', 'bg-teal-50');
            
            // Disable buttons after choice
            buttons.forEach(b => b.disabled = true);
            buttons.forEach(b => b.classList.add('opacity-50', 'cursor-not-allowed'));

            if (choice === 'A') {
                fbBox.classList.add('border-red-300', 'bg-red-50');
                fbTitle.className = 'font-bold text-lg mb-1 text-red-600';
                fbTitle.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Acercamiento Incorrecto';
                fbText.innerHTML = 'No estás validando el interés de la joven. Direccionarla únicamente por costo sin explorar áreas afines a sus intereses (como lo administrativo/jurídico) puede generar desmotivación. <em>Intenta de nuevo.</em>';
                
                // Allow retry
                setTimeout(() => {
                    fbBox.classList.add('hidden');
                    buttons.forEach(b => {
                        b.disabled = false;
                        b.classList.remove('opacity-50', 'cursor-not-allowed');
                    });
                }, 4000);
                
            } else if (choice === 'B') {
                fbBox.classList.add('border-teal-300', 'bg-teal-50');
                fbTitle.className = 'font-bold text-lg mb-1 text-teal-700';
                fbTitle.innerHTML = '<i class="fas fa-star"></i> ¡Bien hecho!';
                fbText.innerHTML = 'Al mostrarle la opción Tecnológica dentro de sus áreas de interés, le das una ruta de tránsito inmediato al trabajo que luego puede homologar para su meta profesional (Derecho), reduciendo la frustración y el riesgo de deserción.';
                
                state.scene4Completed = true;
                DOM.btnNext.disabled = false;
                
                // Highlight correct button
                buttons[1].classList.remove('opacity-50');
                buttons[1].classList.add('ring-2', 'ring-teal-500', 'bg-teal-50');
            }
        };

        window.downloadChecklist = function() {
            DOM.modalTitle.textContent = "Checklist del Guía: Mitos vs. Realidades";
            DOM.modalBody.innerHTML = `

            DOM.modalOverlay.classList.remove('opacity-0', 'pointer-events-none');
            DOM.modalContent.classList.remove('scale-95');
            DOM.modalContent.classList.add('scale-100');
        };

        // Initialize App
        window.onload = () => {
            renderScene();
        };

    </script>
