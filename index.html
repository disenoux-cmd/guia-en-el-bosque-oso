<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Rol de Guía en el Bosque de la Formación</title>
    <link rel="icon" type="image/x-icon" href="imgs/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        oso: {
                            dark: '#1e293b', // Deep blue/black for bear body
                            light: '#f8fafc', // White for face
                            accent: '#d97706', // Brown/Orange for vest/hat
                            bg: '#14b8a6' // Teal background reference
                        }
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.5s ease-out forwards'
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        'pulse-glow': {
                            '0%, 100%': { opacity: 1, filter: 'drop-shadow(0 0 8px rgba(234,179,8,0.6))' },
                            '50%': { opacity: .7, filter: 'drop-shadow(0 0 2px rgba(234,179,8,0.2))' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: 0 },
                            '100%': { transform: 'translateY(0)', opacity: 1 },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #f8fffe 0%, #eef6ff 100%); color: #1e293b; overflow: hidden; }
        .forest-bg {
            background:
                radial-gradient(circle at top left, rgba(45, 212, 191, 0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(96, 165, 250, 0.15), transparent 26%),
                linear-gradient(to bottom, #f8fffe 0%, #f5fdfb 30%, #ffffff 100%);
            position: relative;
        }
        .forest-bg::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 20px 20px; opacity: 0.5; pointer-events: none;
        }
        
        /* Drag and drop custom styles for mobile fallback */
        .draggable-item { cursor: pointer; transition: all 0.2s; }
        .draggable-item:hover { transform: scale(1.02); }
        .draggable-item.selected { box-shadow: 0 0 0 4px #eab308; transform: scale(1.05); z-index: 10;}
        .drop-zone { transition: all 0.3s; border: 2px dashed rgba(0,0,0,0.15); }
        .drop-zone.highlight { background-color: rgba(20, 184, 166, 0.1); border-color: #0d9488; }
        .drop-zone.active-target { border-color: #ca8a04; background-color: rgba(234, 179, 8, 0.08); box-shadow: 0 0 15px rgba(234,179,8,0.15) inset;}
        
        /* Perspective paths for Scene 1 */
        .path-container { perspective: 1000px; }
        .path { transform: rotateX(60deg); transform-origin: bottom center; }
        
        .hide { display: none !important; }
        .glass-panel { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(14px); border: 1px solid rgba(148, 163, 184, 0.18); box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08); }
        .hero-card { background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.88)); border: 1px solid rgba(148, 163, 184, 0.18); box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08); }
        .soft-card { background: rgba(255,255,255,0.9); border: 1px solid rgba(148, 163, 184, 0.2); box-shadow: 0 14px 28px rgba(15, 23, 42, 0.06); }
        .gradient-chip { background: linear-gradient(90deg, #14b8a6, #3b82f6); color: #fff; }
        .image-placeholder {
            background: linear-gradient(135deg, rgba(20,184,166,0.12), rgba(59,130,246,0.10));
            border: 2px dashed rgba(20, 184, 166, 0.35);
        }
        .scene-grid { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 1rem; width: 100%; }
        .myth-token { box-shadow: 0 10px 18px rgba(15, 23, 42, 0.08); }
        .myth-token.correct { background: linear-gradient(135deg, #047857, #10b981); color: #ecfdf5; border-color: #10b981; }
        .myth-token.error { background: #fee2e2; border-color: #fca5a5; color: #991b1b; }
        .hotspot {
            position: absolute;
            width: 54px;
            height: 54px;
            border-radius: 9999px;
            border: 0;
            background: rgba(255, 255, 255, 0.9);
            color: #0f766e;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .hotspot:hover {
            transform: scale(1.08);
            box-shadow: 0 16px 34px rgba(15, 23, 42, 0.22);
        }
        .hotspot::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 9999px;
            border: 2px solid rgba(20, 184, 166, 0.35);
            animation: pulse-ring 2.2s ease-out infinite;
        }
        .hotspot-label {
            position: absolute;
            transform: translateX(-50%);
            white-space: nowrap;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 10px;
            border-radius: 9999px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.18);
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.9); opacity: 0.85; }
            70% { transform: scale(1.25); opacity: 0; }
            100% { transform: scale(1.25); opacity: 0; }
        }
        .hotspot--amber { background: linear-gradient(135deg, #f59e0b, #fbbf24); color: #ffffff; }
        .hotspot--amber::after { border-color: rgba(245, 158, 11, 0.45); }
        .scene3-cta {
            animation: scene3-cta-bounce 2.4s ease-in-out infinite;
            position: relative;
        }
        .scene3-cta::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 9999px;
            border: 2px solid rgba(255, 255, 255, 0.55);
            opacity: 0;
            animation: scene3-cta-halo 2.4s ease-out infinite;
            pointer-events: none;
        }
        .scene3-cta:hover { animation: none; transform: scale(1.06); }
        .scene3-cta:hover::after { opacity: 0; animation: none; }
        .scene3-cta:nth-child(2) { animation-delay: 0.3s; }
        .scene3-cta:nth-child(2)::after { animation-delay: 0.3s; }
        .scene3-cta:nth-child(3) { animation-delay: 0.6s; }
        .scene3-cta:nth-child(3)::after { animation-delay: 0.6s; }
        @keyframes scene3-cta-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        @keyframes scene3-cta-halo {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1.2); opacity: 0; }
            100% { transform: scale(1.2); opacity: 0; }
        }
        .sim-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.9rem;
            border-radius: 9999px;
            font-size: 0.78rem;
            font-weight: 600;
            line-height: 1.2;
            transition: transform 0.15s ease, box-shadow 0.2s ease;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            color: #334155;
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.05);
        }
        .sim-chip:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08); }
        .sim-chip--bad { border-color: #fecdd3; color: #9f1239; }
        .sim-chip--good { border-color: #a7f3d0; color: #047857; }
        .sim-chip--custom { border-color: #fde68a; color: #b45309; }
        .sim-chip__tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.4rem;
            height: 1.4rem;
            border-radius: 9999px;
            background: rgba(15, 23, 42, 0.08);
            font-size: 0.7rem;
            font-weight: 800;
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 9999px;
            background: #6366f1;
            opacity: 0.4;
            animation: typing-bounce 1s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }
        @keyframes typing-bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-4px); opacity: 1; }
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center p-2 sm:p-4">

    <div id="app-container" class="w-full max-w-[1440px] h-full max-h-[900px] forest-bg rounded-2xl shadow-2xl overflow-hidden flex flex-col relative border border-gray-200">
        
        <!-- Header -->
        <header class="glass-panel p-4 flex justify-between items-center z-20">
            <div>
                <h1 class="text-xl sm:text-2xl font-bold text-teal-700 leading-tight">El Bosque de la Formación</h1>
                <p class="text-xs sm:text-sm text-gray-500">Módulo 3: ¿Quién soy y qué quiero aprender?</p>
            </div>
            <div class="flex items-center gap-2">
                <span id="scene-indicator" class="bg-teal-50 text-teal-700 text-xs font-bold px-3 py-1 rounded-full border border-teal-200">Escena 1/5</span>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="scene-container" class="flex-1 relative overflow-y-auto overflow-x-hidden p-4 sm:p-6 flex flex-col items-center">
            <!-- Scenes will be injected here via JS -->
        </main>

        <!-- Footer Navigation -->
        <footer class="glass-panel p-4 flex justify-between items-center z-20">
            <button id="btn-prev" class="px-4 py-2 rounded-lg font-semibold bg-gray-100 hover:bg-gray-200 text-gray-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                <i class="fas fa-chevron-left"></i> Atrás
            </button>
            <button id="btn-next" class="px-6 py-2 rounded-lg font-bold bg-teal-600 hover:bg-teal-500 text-white shadow-lg transition-all transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                Siguiente <i class="fas fa-chevron-right"></i>
            </button>
        </footer>

        <!-- Oso orientador: imagen SVG externa (imgs/oso.svg) -->

        <!-- Modals Container -->
        <div id="modal-overlay" class="absolute inset-0 bg-slate-900/55 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300">
            <div id="modal-content" class="relative bg-white border border-slate-200 rounded-3xl max-w-2xl w-full shadow-[0_30px_80px_rgba(15,23,42,0.35)] transform scale-95 transition-transform duration-300 overflow-hidden">
                <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-teal-500 via-sky-500 to-amber-400"></div>
                <div class="p-6 md:p-7">
                    <div class="flex items-start gap-4 mb-4">
                        <div id="modal-icon" class="w-12 h-12 rounded-2xl bg-gradient-to-br from-amber-400 to-amber-500 text-white flex items-center justify-center text-xl shadow-md shrink-0">
                            <i class="fas fa-lightbulb"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h2 id="modal-title" class="text-xl md:text-2xl font-extrabold text-slate-800 leading-tight">Título</h2>
                            <p id="modal-subtitle" class="text-xs md:text-sm text-slate-500 mt-0.5">Detalle del recurso</p>
                        </div>
                        <button id="btn-close-modal" class="w-9 h-9 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-500 hover:text-slate-800 flex items-center justify-center transition-colors shrink-0">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div id="modal-body" class="text-slate-600 space-y-4 max-h-[60vh] overflow-y-auto pr-1">
                        <!-- Dynamic content -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data for Drag and Drop (Scene 2)
        const mitosData = [
            { id: 'm1', text: 'Alta demanda laboral en el sector productivo', target: 'tecnica' },
            { id: 'm2', text: 'Retorno de inversión más rápido (1-2 años)', target: 'tecnica' },
            { id: 'm3', text: 'Mayor tiempo de estudio (4-5 años o más)', target: 'uni' },
            { id: 'm4', text: 'Mercado saturado en ciertas áreas tradicionales', target: 'uni' },
            { id: 'm5', text: 'Alta expectativa de remuneración (no siempre inmediata)', target: 'uni' },
            { id: 'm6', text: 'Especialización técnica práctica para la industria', target: 'tecnica' }
        ];

        // Global State
        const state = {
            currentScene: 1,
            maxScenes: 5,
            scene2Completed: false,
            scene4Completed: false,
            selectedDraggableId: null // For mobile click-to-move fallback
        };

        // DOM Elements
        const DOM = {
            container: document.getElementById('scene-container'),
            btnNext: document.getElementById('btn-next'),
            btnPrev: document.getElementById('btn-prev'),
            indicator: document.getElementById('scene-indicator'),
            modalOverlay: document.getElementById('modal-overlay'),
            modalContent: document.getElementById('modal-content'),
            modalTitle: document.getElementById('modal-title'),
            modalSubtitle: document.getElementById('modal-subtitle'),
            modalIcon: document.getElementById('modal-icon'),
            modalBody: document.getElementById('modal-body'),
            btnCloseModal: document.getElementById('btn-close-modal')
        };

        const scenes = {
            1: () => `
                <div class="w-full h-full flex flex-col animate-slide-up">
                    <div class="relative flex-1 overflow-hidden">
                        <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('imgs/bosque.svg');"></div>
                        <div class="absolute top-5 right-5 z-10 text-amber-400/80 text-5xl animate-pulse pointer-events-none"><i class="far fa-compass"></i></div>
                        <div class="absolute top-5 left-5 z-10 bg-white/85 text-slate-700 text-xs md:text-sm font-semibold px-4 py-2 rounded-full shadow-sm border border-white/60">
                            Explora los puntos interactivos del bosque
                        </div>
                        <div class="absolute inset-0">
                            <button class="hotspot" style="left: 22%; top: 64%;" onclick="openModal('rutaTecnica')" aria-label="Ver información sobre ruta técnica y tecnológica">
                                <i class="fas fa-tools text-lg"></i>
                            </button>
                            <span class="hotspot-label" style="left: 24%; top: 56%;">Ruta técnica</span>

                            <button class="hotspot" style="left: 50%; top: 60%;" onclick="openModal('rutaUniversitaria')" aria-label="Ver información sobre ruta universitaria">
                                <i class="fas fa-university text-lg"></i>
                            </button>
                            <span class="hotspot-label" style="left: 52%; top: 52%;">Ruta universitaria</span>

                            <button class="hotspot" style="left: 78%; top: 62%;" onclick="openModal('decisionInformada')" aria-label="Ver información sobre decisión informada">
                                <i class="fas fa-lightbulb text-lg"></i>
                            </button>
                            <span class="hotspot-label" style="left: 80%; top: 54%;">Decisión informada</span>

                            <button class="hotspot hotspot--amber" style="left: 50%; top: 18%;" onclick="openModal('realidad')" aria-label="Ver Realidad vs. Mito">
                                <i class="fas fa-chart-pie text-lg"></i>
                            </button>
                            <span class="hotspot-label" style="left: 52%; top: 10%;">Mito vs. Realidad</span>
                        </div>
                    </div>
                </div>
            `,
            2: () => `
                <div class="w-full h-full flex flex-col gap-4 animate-slide-up">
                    <div class="hero-card rounded-[28px] p-5 md:p-6 relative overflow-hidden">
                        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,_rgba(20,184,166,0.14),_transparent_32%),radial-gradient(circle_at_bottom_right,_rgba(99,102,241,0.12),_transparent_30%)]"></div>
                        <div class="relative flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                            <div>
                                <span class="gradient-chip text-xs font-bold px-4 py-2 rounded-full uppercase tracking-[0.18em]">Mini juego</span>
                                <h2 class="text-2xl md:text-3xl font-extrabold text-slate-800 mt-3">Derribando Mitos en el Sendero</h2>
                                <p class="text-slate-600 text-sm md:text-base mt-2 max-w-2xl">Lanza cada afirmación al camino correcto. Gana puntos cuando aciertes y descubre qué ruta se ajusta mejor a la realidad.</p>
                            </div>
                            <div class="flex items-center gap-3 bg-white/80 border border-white/70 rounded-2xl px-4 py-3 shadow-sm">
                                <div class="text-center">
                                    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Puntaje</p>
                                    <p class="text-2xl font-extrabold text-teal-700"><span id="s2-score">0</span><span class="text-slate-400 text-base">/${mitosData.length}</span></p>
                                </div>
                                <div class="w-px h-10 bg-slate-200"></div>
                                <div class="text-center">
                                    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Restantes</p>
                                    <p class="text-2xl font-extrabold text-slate-700" id="s2-remaining">${mitosData.length}</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid lg:grid-cols-[1.4fr_1fr] gap-4 items-start">
                        <div class="soft-card rounded-[28px] p-4 md:p-5">
                            <div class="grid md:grid-cols-2 gap-4 min-h-[340px]">
                                <div id="tree-tecnica" class="drop-zone drop-zone--game rounded-[24px] border-2 border-teal-200 bg-gradient-to-b from-teal-50 to-emerald-50 p-4 md:p-5 relative" data-target="tecnica" onclick="handleZoneClick('tecnica')">
                                    <div class="flex items-center justify-between mb-3">
                                        <div class="flex items-center gap-3">
                                            <div class="w-12 h-12 rounded-2xl bg-teal-600 text-white flex items-center justify-center shadow-lg"><i class="fas fa-tools text-lg"></i></div>
                                            <div>
                                                <h3 class="font-extrabold text-teal-800 text-base">Técnica</h3>
                                                <p class="text-xs text-teal-700">Aplicación práctica</p>
                                            </div>
                                        </div>
                                        <span class="text-xs font-bold text-teal-700 bg-white/80 px-3 py-1 rounded-full border border-teal-200"><span id="count-tecnica">0</span></span>
                                    </div>
                                    <div class="items-container drop-zone__items w-full flex flex-col gap-2 min-h-[200px]"></div>
                                    <p class="text-[11px] text-teal-700 mt-3 text-center">Suelta aquí las afirmaciones del camino técnico</p>
                                </div>
                                <div id="tree-uni" class="drop-zone drop-zone--game rounded-[24px] border-2 border-indigo-200 bg-gradient-to-b from-indigo-50 to-slate-50 p-4 md:p-5 relative" data-target="uni" onclick="handleZoneClick('uni')">
                                    <div class="flex items-center justify-between mb-3">
                                        <div class="flex items-center gap-3">
                                            <div class="w-12 h-12 rounded-2xl bg-indigo-600 text-white flex items-center justify-center shadow-lg"><i class="fas fa-university text-lg"></i></div>
                                            <div>
                                                <h3 class="font-extrabold text-indigo-800 text-base">Universitaria</h3>
                                                <p class="text-xs text-indigo-700">Trayectoria larga</p>
                                            </div>
                                        </div>
                                        <span class="text-xs font-bold text-indigo-700 bg-white/80 px-3 py-1 rounded-full border border-indigo-200"><span id="count-uni">0</span></span>
                                    </div>
                                    <div class="items-container drop-zone__items w-full flex flex-col gap-2 min-h-[200px]"></div>
                                    <p class="text-[11px] text-indigo-700 mt-3 text-center">Suelta aquí las afirmaciones del camino universitario</p>
                                </div>
                            </div>
                        </div>
                        <div class="soft-card rounded-[28px] p-4 md:p-5 relative">
                            <div class="flex items-center justify-between mb-3">
                                <h4 class="text-xs uppercase text-slate-500 tracking-wider font-bold">Mazo de afirmaciones</h4>
                                <span class="text-xs font-bold text-amber-600 bg-amber-50 border border-amber-200 px-3 py-1 rounded-full">Arrastra o toca</span>
                            </div>
                            <div id="drag-container" class="flex flex-col gap-2 min-h-[280px]">
                            ${mitosData.map(m => `
                                <div id="${m.id}" class="draggable-item myth-token bg-white hover:bg-slate-50 border border-slate-200 text-slate-700 text-sm py-3 px-3 rounded-2xl shadow-sm cursor-grab active:cursor-grabbing flex items-center gap-3" draggable="true" data-target="${m.target}" onclick="handleItemClick('${m.id}')">
                                    <span class="w-8 h-8 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center text-xs font-bold"><i class="fas fa-grip-vertical"></i></span>
                                    <span class="flex-1">${m.text}</span>
                                </div>
                            `).join('')}
                            </div>
                            <p class="text-xs text-slate-500 mt-4 flex items-center gap-2"><i class="fas fa-mobile-screen text-amber-500"></i> En móvil toca una tarjeta y luego el camino.</p>
                        </div>
                    </div>

                    <div id="s2-feedback" class="hidden bg-teal-50 border border-teal-300 text-teal-800 p-4 rounded-2xl flex items-start gap-3 mt-2 soft-card">
                        <img src="imgs/oso.svg" alt="Oso orientador" class="w-12 h-12 flex-shrink-0 drop-shadow">
                        <p class="text-sm self-center">¡Excelente! Educar no es desanimar de la universidad, sino <strong>ampliar el menú</strong> para que cada joven decida con base en la realidad, sus intereses y su contexto.</p>
                    </div>
                </div>
            `,
            3: () => `
                <div class="w-full h-full flex flex-col gap-4 animate-slide-up">
                    <div class="hero-card rounded-[28px] p-5 md:p-7 relative overflow-hidden">
                        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,_rgba(20,184,166,0.14),_transparent_32%),radial-gradient(circle_at_bottom_right,_rgba(234,179,8,0.12),_transparent_30%)]"></div>
                        <div class="relative flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                            <div>

            DOM.indicator.textContent = `Escena ${state.currentScene}/${state.maxScenes}`;
            
            // Update button states
            DOM.btnPrev.disabled = state.currentScene === 1;
            
            // Progression logic restrictions
            if (state.currentScene === 2 && !state.scene2Completed) {
                DOM.btnNext.disabled = true;
                setupDragAndDrop();
            } else if (state.currentScene === 4 && !state.scene4Completed) {
                DOM.btnNext.disabled = true;
            } else if (state.currentScene === 5) {
                DOM.btnNext.disabled = true;
                DOM.btnNext.classList.add('hide');
            } else {
                DOM.btnNext.disabled = false;
                DOM.btnNext.classList.remove('hide');
            }
        }

        // Navigation Handlers
        DOM.btnNext.addEventListener('click', () => {
            if (state.currentScene < state.maxScenes) {
                state.currentScene++;
                renderScene();
            }
        });

        DOM.btnPrev.addEventListener('click', () => {
            if (state.currentScene > 1) {
                state.currentScene--;
                renderScene();
            }
        });

        function setupDragAndDrop() {
            const items = document.querySelectorAll('.draggable-item');
            const zones = document.querySelectorAll('.drop-zone');

            // HTML5 Drag events for Desktop
            items.forEach(item => {
                item.addEventListener('dragstart', e => {
                    e.dataTransfer.setData('text/plain', e.target.id);
                    e.target.classList.add('opacity-50');
                    // Reset selection if drag starts
                    clearSelection();
                });
                item.addEventListener('dragend', e => {
                    e.target.classList.remove('opacity-50');
                    checkCompletion();
                });
            });

            zones.forEach(zone => {
                zone.addEventListener('dragover', e => {
                    e.preventDefault();
                    zone.classList.add('highlight');
                });
                zone.addEventListener('dragleave', () => {
                    zone.classList.remove('highlight');
                });
                zone.addEventListener('drop', e => {
                    e.preventDefault();
                    zone.classList.remove('highlight');
                    const id = e.dataTransfer.getData('text/plain');
                    processDrop(id, zone.dataset.target, zone);
                });
            });
        }

        // Mobile/Click Fallback for Drag & Drop
        window.handleItemClick = function(id) {
            const item = document.getElementById(id);
            // Ignore if already placed correctly
            if(item.parentElement.classList.contains('items-container')) return;

            if (state.selectedDraggableId === id) {
                // Deselect
                clearSelection();
            } else {
                clearSelection();
                state.selectedDraggableId = id;
                item.classList.add('selected');
                // Highlight target zones
                document.querySelectorAll('.drop-zone').forEach(z => z.classList.add('active-target'));
            }
        };

        window.handleZoneClick = function(targetZoneType) {
            if (!state.selectedDraggableId) return;
            
            const zone = document.querySelector(`.drop-zone[data-target="${targetZoneType}"]`);
            processDrop(state.selectedDraggableId, targetZoneType, zone);
            clearSelection();
            checkCompletion();
        };

        function clearSelection() {
            state.selectedDraggableId = null;
            document.querySelectorAll('.draggable-item').forEach(i => i.classList.remove('selected'));
            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active-target'));
        }

        function processDrop(itemId, targetZoneType, zoneElement) {
            const item = document.getElementById(itemId);
            if (!item) return;

            const expectedTarget = item.dataset.target;
            
            if (expectedTarget === targetZoneType) {
                // Correct
                item.classList.remove('bg-slate-50', 'hover:bg-slate-100', 'bg-white', 'hover:bg-slate-50', 'border-slate-200', 'text-slate-700', 'cursor-grab', 'active:cursor-grabbing');
                item.classList.add('correct', 'cursor-default');
                item.draggable = false;
                item.onclick = null; // remove click handler
                
                const container = zoneElement.querySelector('.items-container');
                container.appendChild(item);
                
                // Add tiny animation
                item.animate([{transform: 'scale(1.1)'}, {transform: 'scale(1)'}], {duration: 300});

                bumpScore(zoneElement);
            } else {
                // Incorrect - shake animation
                item.animate([
                    {transform: 'translateX(0)'}, {transform: 'translateX(-5px)'},
                    {transform: 'translateX(5px)'}, {transform: 'translateX(-5px)'},
                    {transform: 'translateX(5px)'}, {transform: 'translateX(0)'}
                ], {duration: 400});
                
                // Visual feedback of error
                item.classList.add('error');
                setTimeout(() => item.classList.remove('error'), 600);
            }
        }

        function checkCompletion() {
            const remainingInPool = document.getElementById('drag-container').children.length;
            const remainingEl = document.getElementById('s2-remaining');
            if (remainingEl) remainingEl.textContent = remainingInPool;
            if (remainingInPool === 0) {
                state.scene2Completed = true;
                document.getElementById('s2-feedback').classList.remove('hidden');
                DOM.btnNext.disabled = false;
            }
        }

        function bumpScore(zoneElement) {
            const scoreEl = document.getElementById('s2-score');
            if (!scoreEl) return;
            const current = parseInt(scoreEl.textContent || '0', 10);
            scoreEl.textContent = current + 1;

            const target = zoneElement && zoneElement.dataset.target;
            const counter = document.getElementById(target ? `count-${target}` : null);
            if (counter) counter.textContent = parseInt(counter.textContent || '0', 10) + 1;

            if (zoneElement) {
                zoneElement.animate([
                    { transform: 'scale(1)' },
                    { transform: 'scale(1.04)' },
                    { transform: 'scale(1)' }
                ], { duration: 320, easing: 'ease-out' });
            }
        }

        window.switchTab = function(tabId) {
            const palette = {
                1: { border: 'border-teal-500', chipBg: 'bg-teal-100', chipText: 'text-teal-700' },
                2: { border: 'border-sky-500', chipBg: 'bg-sky-100', chipText: 'text-sky-700' },
                3: { border: 'border-amber-500', chipBg: 'bg-amber-100', chipText: 'text-amber-700' }
            };
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`tab-${i}`);
                const chip = btn.querySelector('span');
                const isActive = i === tabId;
                btn.classList.remove('border-teal-500', 'border-sky-500', 'border-amber-500', 'border-transparent', 'bg-white', 'text-slate-800', 'text-slate-500');
                if (isActive) {
                    btn.classList.add(palette[i].border, 'bg-white', 'text-slate-800');
                } else {
                    btn.classList.add('border-transparent', 'text-slate-500', 'hover:bg-white');
                }

                if (chip) {
                    chip.classList.remove('bg-teal-100', 'text-teal-700', 'bg-sky-100', 'text-sky-700', 'bg-amber-100', 'text-amber-700', 'bg-slate-200', 'text-slate-500');
                    if (isActive) {
                        chip.classList.add(palette[i].chipBg, palette[i].chipText);
                    } else {
                        chip.classList.add('bg-slate-200', 'text-slate-500');
                    }
                }

                const content = document.getElementById(`tab-content-${i}`);
                if (content) {
                    content.classList.toggle('hidden', !isActive);
                }
            }
        };

        function simSendResponse(option) {
            if (option === 'A') {
                appendChatMessage({ role: 'guide', text: 'Mejor mira una técnica administrativa, es más corta y barata para que no batalles.' });
                showTyping();
                setTimeout(() => {
                    hideTyping();
                    appendChatMessage({ role: 'student', text: 'Mmm… pero a mí me llama la atención lo jurídico, ¿no hay algo parecido?' });
                    renderFeedback({
                        title: 'Acercamiento a mejorar',
                        text: 'Estás cerrando opciones solo por costo. Vuelve a intentarlo validando los intereses de Valeria antes de proponer una ruta.',
                        tone: 'bad'
                    });
                    unlockForRetry();
                }, 1400);
                lockSuggestions();
            } else if (option === 'B') {
                appendChatMessage({ role: 'guide', text: 'Conozco opciones de formación tecnológica en áreas jurídicas y administrativas. ¿Comparamos tiempos, costos y empleabilidad?' });
                showTyping();
                setTimeout(() => {
                    hideTyping();
                    appendChatMessage({ role: 'student', text: '¡Eso sí me interesa! ¿Por dónde empiezo?' });
                    renderFeedback({
                        title: '¡Bien hecho!',

                        tone: 'good'
                    });
                    state.scene4Completed = true;
                    DOM.btnNext.disabled = false;
                }, 1400);
                lockSuggestions();
            } else if (option === 'C') {
                const form = document.getElementById('sim-custom-form');
                if (form) {
                    form.classList.remove('hidden');
                    const input = document.getElementById('sim-input');
                    if (input) input.focus();
                }
            }
        }

        function simSendCustom() {
            const input = document.getElementById('sim-input');
            if (!input) return;
            const value = input.value.trim();
            if (!value) return;
            appendChatMessage({ role: 'guide', text: value });
            input.value = '';
            showTyping();
            setTimeout(() => {
                hideTyping();
                const positive = /interés|opcion|ruta|tecnol|invest|camino|plan/i.test(value);
                if (positive) {
                    appendChatMessage({ role: 'student', text: 'Gracias profe, me siento más tranquila. Vamos a revisarlo.' });
                    renderFeedback({

            }, 1400);
            lockSuggestions();
        }

                    </div>
                    <div class="bg-amber-50 border-l-4 border-amber-400 p-4 rounded-2xl">
                        <p class="text-sm text-slate-700"><strong class="text-amber-700">Recuerda:</strong> la Orientación Socio Ocupacional es un acto de <strong>justicia social</strong>.</p>
                    </div>
                    <div class="flex flex-wrap gap-2 pt-1">
                        <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-700 text-white text-sm font-bold px-4 py-2 rounded-full flex items-center gap-2">
                            <i class="fas fa-print"></i> Imprimir / Guardar como PDF
                        </button>
                    </div>
                </div>
            `;
            DOM.modalOverlay.classList.remove('opacity-0', 'pointer-events-none');
            DOM.modalContent.classList.remove('scale-95');
            DOM.modalContent.classList.add('scale-100');
        };

        window.restart = function() {
            state.currentScene = 1;
            state.scene2Completed = false;
            state.scene4Completed = false;
            state.selectedDraggableId = null;
            DOM.btnNext.classList.remove('hide');
            renderScene();
        };

        // Initialize App
        window.onload = () => {
            renderScene();
        };

    </script>
</body>
</html>
